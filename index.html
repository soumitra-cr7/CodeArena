<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeArena - Programming Contest Platform</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d0d1a 100%);
        }
        
        .card-gradient {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.8) 0%, rgba(20, 20, 40, 0.9) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .glow-border {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15), inset 0 0 20px rgba(99, 102, 241, 0.05);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .code-editor {
            background: #1e1e2e;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .code-editor textarea {
            background: transparent;
            color: #a6e3a1;
            caret-color: #f5e0dc;
            resize: none;
            outline: none;
        }
        
        .line-numbers {
            background: rgba(0, 0, 0, 0.3);
            color: #6c7086;
            user-select: none;
        }
        
        .verdict-accepted { color: #a6e3a1; background: rgba(166, 227, 161, 0.1); }
        .verdict-wrong { color: #f38ba8; background: rgba(243, 139, 168, 0.1); }
        .verdict-tle { color: #fab387; background: rgba(250, 179, 135, 0.1); }
        .verdict-rte { color: #f9e2af; background: rgba(249, 226, 175, 0.1); }
        .verdict-ce { color: #cba6f7; background: rgba(203, 166, 247, 0.1); }
        
        .timer-urgent { animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 3px; }
        
        .toast {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .problem-tab {
            transition: all 0.2s ease;
        }
        
        .problem-tab.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        
        .problem-tab.solved {
            border-color: #a6e3a1;
        }
        
        .leaderboard-row:nth-child(1) .rank-badge { background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); }
        .leaderboard-row:nth-child(2) .rank-badge { background: linear-gradient(135deg, #c0c0c0 0%, #a0a0a0 100%); }
        .leaderboard-row:nth-child(3) .rank-badge { background: linear-gradient(135deg, #cd7f32 0%, #b87333 100%); }
    </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full gradient-bg text-gray-100 overflow-auto">
  <div id="app" class="min-h-full w-full"><!-- Toast Container -->
   <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div><!-- Navigation -->
   <nav id="navbar" class="sticky top-0 z-40 backdrop-blur-xl bg-black/30 border-b border-indigo-500/20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
     <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-3 cursor-pointer" onclick="navigateTo('home')">
       <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
        </svg>
       </div><span id="platform-title" class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">CodeArena</span>
      </div>
      <div class="flex items-center gap-4">
       <div id="nav-links" class="hidden md:flex items-center gap-2"><button onclick="navigateTo('home')" class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">Home</button> <button onclick="navigateTo('contests')" class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">Contests</button> <button onclick="navigateTo('leaderboard')" class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">Leaderboard</button> <button onclick="navigateTo('submissions')" class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">My Submissions</button>
       </div>
       <div id="user-section" class="flex items-center gap-3"><!-- Dynamic user section -->
       </div>
      </div>
     </div>
    </div>
   </nav><!-- Main Content -->
   <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"><!-- Dynamic content -->
   </main>
  </div>
  <script>
        // ==================== CONFIGURATION ====================
        let CONFIG = {
            ADMIN_IP: "192.168.1.100",
            CONTEST_DURATION: 90 * 60 * 1000,
            AI_SIMILARITY_THRESHOLD: 80,
            POINTS_PER_PROBLEM: 5,
            AI_PENALTY: 2.5,
            MAX_RUNTIME: 1000,
            MAX_MEMORY: 256,
            RATE_LIMIT_SUBMISSIONS: 5,
            RATE_LIMIT_WINDOW: 60000,
            MAX_CODE_LENGTH: 50000,
            SESSION_TIMEOUT: 30 * 60 * 1000
        };
        
        // Security & Anti-Cheat
        const SECURITY = {
            suspiciousTokenPatterns: [
                /ChatGPT|Claude|Gemini|AI.*generated|auto-generated/i,
                /import\s+ai|from\s+ai|use\s+ai/i,
                /\/\*.*GENERATED.*\*\//i
            ],
            restrictedLibraries: [
                'requests', 'urllib', 'socket', 'os.system', 'exec', 'eval'
            ],
            codeSubmissionCache: new Map(),
            rateLimitTracker: new Map(),
            deviceFingerprints: new Map()
        };
        
        // ==================== STATE MANAGEMENT ====================
        let appState = {
            currentUser: null,
            currentView: 'home',
            currentContest: null,
            currentProblem: null,
            contestTimer: null,
            isAdmin: false,
            data: {
                users: [],
                contests: [],
                problems: [],
                submissions: [],
                participations: [],
                leaderboard: []
            }
        };
        
        const defaultConfig = {
            platform_name: "CodeArena",
            welcome_message: "Welcome to the ultimate programming contest platform",
            primary_color: "#6366f1",
            secondary_color: "#1e1e2e",
            text_color: "#f1f5f9",
            accent_color: "#a6e3a1",
            background_color: "#0f0f23"
        };
        
        let config = { ...defaultConfig };
        
        // ==================== SDK INITIALIZATION ====================
        const dataHandler = {
            onDataChanged(data) {
                processDataRecords(data);
                renderCurrentView();
            }
        };
        
        function processDataRecords(records) {
            appState.data.users = records.filter(r => r.type === 'user');
            appState.data.contests = records.filter(r => r.type === 'contest');
            appState.data.problems = records.filter(r => r.type === 'problem');
            appState.data.submissions = records.filter(r => r.type === 'submission');
            appState.data.participations = records.filter(r => r.type === 'participation');
            appState.data.leaderboard = records.filter(r => r.type === 'leaderboard');
        }
        
        async function initializeApp() {
            // Initialize Element SDK
            if (window.elementSdk) {
                window.elementSdk.init({
                    defaultConfig,
                    onConfigChange: async (newConfig) => {
                        config = { ...config, ...newConfig };
                        applyConfig();
                    },
                    mapToCapabilities: (cfg) => ({
                        recolorables: [
                            { get: () => cfg.background_color || defaultConfig.background_color, set: (v) => window.elementSdk.setConfig({ background_color: v }) },
                            { get: () => cfg.secondary_color || defaultConfig.secondary_color, set: (v) => window.elementSdk.setConfig({ secondary_color: v }) },
                            { get: () => cfg.text_color || defaultConfig.text_color, set: (v) => window.elementSdk.setConfig({ text_color: v }) },
                            { get: () => cfg.primary_color || defaultConfig.primary_color, set: (v) => window.elementSdk.setConfig({ primary_color: v }) },
                            { get: () => cfg.accent_color || defaultConfig.accent_color, set: (v) => window.elementSdk.setConfig({ accent_color: v }) }
                        ],
                        borderables: [],
                        fontEditable: undefined,
                        fontSizeable: undefined
                    }),
                    mapToEditPanelValues: (cfg) => new Map([
                        ["platform_name", cfg.platform_name || defaultConfig.platform_name],
                        ["welcome_message", cfg.welcome_message || defaultConfig.welcome_message],
                        ["admin_ip", cfg.admin_ip || CONFIG.ADMIN_IP],
                        ["max_runtime", (cfg.max_runtime || CONFIG.MAX_RUNTIME).toString()],
                        ["max_memory", (cfg.max_memory || CONFIG.MAX_MEMORY).toString()]
                    ])
                });
            }
            
            // Initialize Data SDK
            if (window.dataSdk) {
                const result = await window.dataSdk.init(dataHandler);
                if (!result.isOk) {
                    console.error("Failed to initialize Data SDK");
                }
            }
            
            // Check for stored user session
            const storedUser = localStorage.getItem('codeArenaUser');
            if (storedUser) {
                appState.currentUser = JSON.parse(storedUser);
                
                // Check session timeout
                const sessionStart = localStorage.getItem('sessionStart');
                if (sessionStart && Date.now() - parseInt(sessionStart) > CONFIG.SESSION_TIMEOUT) {
                    logout();
                    showToast('Session expired. Please login again.', 'warning');
                }
            }
            
            // Update session timeout
            if (appState.currentUser) {
                localStorage.setItem('sessionStart', Date.now().toString());
            }
            
            // Apply settings from config first
            if (config.admin_ip) CONFIG.ADMIN_IP = config.admin_ip;
            if (config.max_runtime) CONFIG.MAX_RUNTIME = parseInt(config.max_runtime) || 1000;
            if (config.max_memory) CONFIG.MAX_MEMORY = parseInt(config.max_memory) || 256;
            
            // Auto-login admin if IP is stored and matches config
            const storedAdminIP = localStorage.getItem('userIP');
            if (storedAdminIP && !appState.currentUser && !appState.isAdmin) {
                if (storedAdminIP === CONFIG.ADMIN_IP) {
                    appState.isAdmin = true;
                    appState.currentUser = {
                        userId: 'admin_' + generateId(''),
                        username: 'Admin',
                        isAdmin: true
                    };
                    logSecurityEvent('admin_auto_login', {
                        ip: storedAdminIP,
                        timestamp: new Date().toISOString()
                    });
                }
            }
            
            // Validate IP for admin access
            checkAdminAccess();
            
            applyConfig();
            renderCurrentView();
        }
        
        function applyConfig() {
            const platformTitle = document.getElementById('platform-title');
            if (platformTitle) {
                platformTitle.textContent = config.platform_name || defaultConfig.platform_name;
            }
            document.title = `${config.platform_name || defaultConfig.platform_name} - Programming Contest Platform`;
        }
        
        function checkAdminAccess() {
            // Generate and store device fingerprint
            const deviceFingerprint = generateDeviceFingerprint();
            SECURITY.deviceFingerprints.set('admin', deviceFingerprint);
            
            // Check if admin has stored IP (only if explicitly logged in)
            const storedIP = localStorage.getItem('userIP');
            
            if (!storedIP) {
                // No stored IP - not admin
                appState.isAdmin = false;
                return;
            }
            
            // Validate IP format
            if (!isValidIP(storedIP)) {
                appState.isAdmin = false;
                return;
            }
            
            // Check if IP matches config
            appState.isAdmin = (storedIP === CONFIG.ADMIN_IP);
            
            // Log security event
            if (appState.isAdmin) {
                logSecurityEvent('admin_access_attempt', {
                    ip: storedIP,
                    granted: true,
                    timestamp: new Date().toISOString()
                });
            }
        }
        
        function generateDeviceFingerprint() {
            const components = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                new Date().getTimezoneOffset(),
                Math.random()
            ].join('|');
            
            return generateHash(components);
        }
        
        function isValidIP(ip) {
            const ipv4Regex = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipv4Regex.test(ip)) return false;
            
            const parts = ip.split('.').map(Number);
            return parts.every(p => p >= 0 && p <= 255);
        }
        
        function generateHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }
        
        function logSecurityEvent(eventType, details) {
            const event = {
                type: eventType,
                timestamp: new Date().toISOString(),
                userId: appState.currentUser?.userId || 'anonymous',
                details,
                deviceFingerprint: generateDeviceFingerprint()
            };
            
            // Store in localStorage for audit trail
            const logs = JSON.parse(localStorage.getItem('securityLogs') || '[]');
            logs.push(event);
            if (logs.length > 100) logs.shift();
            localStorage.setItem('securityLogs', JSON.stringify(logs));
        }
        
        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = {
                success: 'bg-green-500/90 border-green-400',
                error: 'bg-red-500/90 border-red-400',
                warning: 'bg-yellow-500/90 border-yellow-400',
                info: 'bg-indigo-500/90 border-indigo-400'
            };
            
            toast.className = `toast px-4 py-3 rounded-lg border ${colors[type]} text-white shadow-lg backdrop-blur-sm`;
            toast.innerHTML = `
                <div class="flex items-center gap-2">
                    <span>${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-2 hover:opacity-70">✕</button>
                </div>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 5000);
        }
        
        // ==================== NAVIGATION ====================
        function navigateTo(view, params = {}) {
            appState.currentView = view;
            if (params.contest) appState.currentContest = params.contest;
            if (params.problem) appState.currentProblem = params.problem;
            renderCurrentView();
            window.scrollTo(0, 0);
        }
        
        function renderCurrentView() {
            const mainContent = document.getElementById('main-content');
            const userSection = document.getElementById('user-section');
            
            // Render user section
            renderUserSection(userSection);
            
            // Render main content based on current view
            switch (appState.currentView) {
                case 'home':
                    renderHomePage(mainContent);
                    break;
                case 'contests':
                    renderContestsPage(mainContent);
                    break;
                case 'contest-detail':
                    renderContestDetail(mainContent);
                    break;
                case 'contest-arena':
                    renderContestArena(mainContent);
                    break;
                case 'leaderboard':
                    renderLeaderboardPage(mainContent);
                    break;
                case 'submissions':
                    renderSubmissionsPage(mainContent);
                    break;
                case 'login':
                    renderLoginPage(mainContent);
                    break;
                case 'register':
                    renderRegisterPage(mainContent);
                    break;
                case 'admin-login':
                    renderAdminLoginPage(mainContent);
                    break;
                case 'admin':
                    if (appState.isAdmin) {
                        renderAdminPanel(mainContent);
                    } else {
                        renderAccessDenied(mainContent);
                    }
                    break;
                case 'admin-contest':
                    if (appState.isAdmin) {
                        renderAdminContestForm(mainContent);
                    } else {
                        renderAccessDenied(mainContent);
                    }
                    break;
                case 'admin-problems':
                    if (appState.isAdmin) {
                        renderAdminProblems(mainContent);
                    } else {
                        renderAccessDenied(mainContent);
                    }
                    break;
                default:
                    renderHomePage(mainContent);
            }
        }
        
        function renderUserSection(container) {
            if (appState.currentUser) {
                // User is logged in
                container.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="px-3 py-1.5 rounded-lg bg-indigo-500/20 border border-indigo-500/30">
                            <span class="text-sm text-indigo-300 mono">${appState.currentUser.username || appState.currentUser.userId}</span>
                        </div>
                        <button onclick="logout()" class="px-3 py-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-all text-sm">
                            Logout
                        </button>
                    </div>
                `;
            } else if (appState.isAdmin) {
                // Admin is logged in
                container.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="px-3 py-1.5 rounded-lg bg-purple-500/20 border border-purple-500/30">
                            <span class="text-sm text-purple-300 mono">🔐 Admin</span>
                        </div>
                        <button onclick="adminLogout()" class="px-3 py-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-all text-sm">
                            Logout
                        </button>
                    </div>
                `;
            } else {
                // Not logged in - show both buttons
                container.innerHTML = `
                    <div class="flex items-center gap-2">
                        <button onclick="navigateTo('login')" class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                            User Login
                        </button>
                        <button onclick="navigateTo('register')" class="btn-primary px-4 py-2 rounded-lg text-white font-medium">
                            Register
                        </button>
                        <button onclick="navigateTo('admin-login')" class="px-4 py-2 rounded-lg text-purple-300 hover:text-purple-200 hover:bg-purple-500/10 transition-all border border-purple-500/30">
                            Admin Access
                        </button>
                    </div>
                `;
            }
        }
        
        // ==================== HOME PAGE ====================
        function renderHomePage(container) {
            const upcomingContests = appState.data.contests.filter(c => c.status === 'upcoming' || c.status === 'active').slice(0, 3);
            
            container.innerHTML = `
                <div class="animate-fade-in space-y-12">
                    <!-- Hero Section -->
                    <section class="text-center py-16">
                        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-500/10 border border-indigo-500/20 mb-6">
                            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                            <span class="text-sm text-indigo-300">Platform Active</span>
                        </div>
                        <h1 class="text-5xl md:text-6xl font-bold mb-6">
                            <span class="bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                                ${config.platform_name || defaultConfig.platform_name}
                            </span>
                        </h1>
                        <p class="text-xl text-gray-400 max-w-2xl mx-auto mb-8">
                            ${config.welcome_message || defaultConfig.welcome_message}
                        </p>
                        <div class="flex flex-wrap justify-center gap-4">
                            <button onclick="navigateTo('contests')" class="btn-primary px-8 py-3 rounded-xl text-white font-semibold text-lg">
                                Browse Contests
                            </button>
                            ${!appState.currentUser ? `
                                <button onclick="navigateTo('register')" class="btn-secondary px-8 py-3 rounded-xl text-indigo-300 font-semibold text-lg">
                                    Get Started
                                </button>
                            ` : ''}
                        </div>
                    </section>
                    
                    <!-- Stats Section -->
                    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${[
                            { label: 'Active Contests', value: appState.data.contests.filter(c => c.status === 'active').length, icon: '🏆' },
                            { label: 'Total Problems', value: appState.data.problems.length, icon: '📝' },
                            { label: 'Submissions', value: appState.data.submissions.length, icon: '📊' },
                            { label: 'Users', value: appState.data.users.length, icon: '👥' }
                        ].map(stat => `
                            <div class="card-gradient rounded-xl p-6 text-center glow-border">
                                <div class="text-3xl mb-2">${stat.icon}</div>
                                <div class="text-3xl font-bold text-white mb-1">${stat.value}</div>
                                <div class="text-sm text-gray-400">${stat.label}</div>
                            </div>
                        `).join('')}
                    </section>
                    
                    <!-- Upcoming Contests -->
                    <section>
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold text-white">Upcoming Contests</h2>
                            <button onclick="navigateTo('contests')" class="text-indigo-400 hover:text-indigo-300 transition-colors">
                                View all →
                            </button>
                        </div>
                        <div class="grid md:grid-cols-3 gap-6">
                            ${upcomingContests.length > 0 ? upcomingContests.map(contest => renderContestCard(contest)).join('') : `
                                <div class="col-span-3 card-gradient rounded-xl p-12 text-center">
                                    <div class="text-4xl mb-4">🎯</div>
                                    <p class="text-gray-400">No upcoming contests. Check back soon!</p>
                                </div>
                            `}
                        </div>
                    </section>
                    
                    <!-- Features Section -->
                    <section class="grid md:grid-cols-3 gap-6">
                        ${[
                            { title: 'Real-time Judging', desc: 'Instant feedback on your submissions with detailed execution results', icon: '⚡' },
                            { title: 'AI Detection', desc: 'Fair competition with AI-generated code similarity detection', icon: '🤖' },
                            { title: 'Leaderboard', desc: 'Compete with others and climb the rankings', icon: '🏅' }
                        ].map(feature => `
                            <div class="card-gradient rounded-xl p-6 glow-border hover:border-indigo-500/40 transition-all">
                                <div class="text-4xl mb-4">${feature.icon}</div>
                                <h3 class="text-lg font-semibold text-white mb-2">${feature.title}</h3>
                                <p class="text-gray-400 text-sm">${feature.desc}</p>
                            </div>
                        `).join('')}
                    </section>
                </div>
            `;
        }
        
        function renderContestCard(contest) {
            const startDate = new Date(contest.startTime);
            const now = new Date();
            const isActive = contest.status === 'active';
            const isUpcoming = contest.status === 'upcoming';
            const isPast = contest.status === 'ended';
            
            return `
                <div class="card-gradient rounded-xl p-6 glow-border hover:border-indigo-500/40 transition-all cursor-pointer" onclick="navigateTo('contest-detail', { contest: '${contest.contestId}' })">

        // ==================== CONTEST ARENA ====================
        async function enterContest(contestId) {
            if (!appState.currentUser) {

                return;
            }
            
            const contest = appState.data.contests.find(c => c.contestId === contestId);

                showToast('Contest has not started yet', 'warning');
                return;

            // Check if already participating
            let participation = appState.data.participations.find(
                p => p.contestRef === contestId && p.userRef === appState.currentUser.userId
            );
            
            if (!participation) {
                // Create new participation
                const now = new Date().toISOString();
                const result = await window.dataSdk.create({
                    type: 'participation',
                    userRef: appState.currentUser.userId,
                    contestRef: contestId,
                    contestStarted: now,
                    timeRemaining: contest.duration || CONTEST_DURATION,
                    solvedProblems: '',
                    totalScore: 0,
                    submissionCount: 0
                });
                
                if (!result.isOk) {
                    showToast('Failed to enter contest', 'error');
                    return;
                }
                
                showToast('Contest started! Good luck!', 'success');
            }
            
            appState.currentContest = contestId;
            appState.currentProblem = 0;
            navigateTo('contest-arena');
        }

        function showContestExpired(container, contest) {
            if (appState.contestTimer) {
                clearInterval(appState.contestTimer);
                appState.contestTimer = null;
            }
            
            container.innerHTML = `

                    <h2 class="text-3xl font-bold text-white mb-4">Time's Up!</h2>

                            View Submissions
                        </button>
                    </div>
                </div>
            `;
            
            // Populate admin IP field after render
            setTimeout(renderLoginPageAsync, 0);
        }
        
        function updateContestTimer(participation, contest) {
            const timerEl = document.getElementById('contest-timer');
            if (!timerEl || !participation) return;
            
            const startTime = new Date(participation.contestStarted).getTime();
            const duration = contest.duration || CONTEST_DURATION;
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, duration - elapsed);
            
            if (remaining <= 0) {
                showContestExpired(document.getElementById('main-content'), contest);
                return;
            }
            
            const hours = Math.floor(remaining / 3600000);
            const minutes = Math.floor((remaining % 3600000) / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            const isUrgent = remaining < 300000; // Less than 5 minutes
            
            timerEl.innerHTML = `
                <div class="flex items-center gap-2 px-4 py-2 rounded-xl ${isUrgent ? 'bg-red-500/20 border border-red-500/30' : 'bg-black/30'}">
                    <svg class="w-5 h-5 ${isUrgent ? 'text-red-400 timer-urgent' : 'text-indigo-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="mono font-bold ${isUrgent ? 'text-red-400' : 'text-white'}">
                        ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}
                    </span>
                </div>
            `;
        }
        
        function selectProblem(index) {
            appState.currentProblem = index;
            renderCurrentView();
        }
        
        function updateLineNumbers() {
            const editor = document.getElementById('code-editor');
            const lineNumbers = document.getElementById('line-numbers');
            if (!editor || !lineNumbers) return;
            
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array.from({ length: Math.max(lines, 20) }, (_, i) => i + 1).join('<br>');
        }
        
        function renderProblemSubmissions(problemId) {
            if (!appState.currentUser) return '<p class="text-gray-500 text-sm">Login to see submissions</p>';
            
            const submissions = appState.data.submissions.filter(
                s => s.problemRef === problemId && s.userRef === appState.currentUser.userId
            ).sort((a, b) => new Date(b.submissionTime) - new Date(a.submissionTime)).slice(0, 5);
            
            if (submissions.length === 0) {
                return '<p class="text-gray-500 text-sm">No submissions yet</p>';
            }
            
            return submissions.map(s => {

        function validateCodeSubmission(code) {
            if (!code || code.length === 0) {
                return { isValid: false, error: 'Please write some code first' };
            }
            
            if (code.length > CONFIG.MAX_CODE_LENGTH) {
                return { isValid: false, error: `Code exceeds maximum length of ${CONFIG.MAX_CODE_LENGTH} characters` };
            }
            
            // Check for binary/executable content
            if (/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(code)) {
                return { isValid: false, error: 'Invalid characters detected' };
            }
            
            // Check for restricted patterns
            if (containsRestrictedPatterns(code)) {
                return { isValid: false, error: 'Code contains restricted/dangerous patterns' };
            }
            
            return { isValid: true };
        }
        
        function containsRestrictedPatterns(code) {
            const dangerous = [
                'system(', 'exec(', 'eval(', 'fork(', 'spawn(',
                '__import__', 'subprocess', 'os.system', 'shell=True',
                'LD_PRELOAD', '/proc/', '/dev/'
            ];
            
            for (const pattern of dangerous) {
                if (code.includes(pattern)) {
                    return true;
                }
            }
            
            return false;
        }
        
        function checkRateLimit(action, limit) {
            const key = `${action}_${appState.currentUser?.userId}`;
            const now = Date.now();
            const submissions = SECURITY.rateLimitTracker.get(key) || [];
            
            // Clean old entries
            const recent = submissions.filter(time => now - time < CONFIG.RATE_LIMIT_WINDOW);
            
            if (recent.length >= limit) {
                return false;
            }
            
            recent.push(now);
            SECURITY.rateLimitTracker.set(key, recent);
            return true;
        }
        
        function analyzeCodeForAI(code) {
            let suspiciousCount = 0;
            
            // Check for AI generation markers
            for (const pattern of SECURITY.suspiciousTokenPatterns) {
                if (pattern.test(code)) {
                    suspiciousCount++;
                }
            }
            
            // Check code structure (too clean/formatted often indicates AI)
            const structureScore = analyzeCodeStructure(code);
            if (structureScore > 0.8) suspiciousCount++;
            
            // Check for common AI library patterns
            for (const lib of SECURITY.restrictedLibraries) {
                if (code.includes(lib)) {
                    suspiciousCount++;
                }
            }
            
            return {
                suspiciousCount,
                isSuspicious: suspiciousCount >= 2
            };
        }
        
        function analyzeCodeStructure(code) {
            // Simple heuristic: perfectly formatted code often indicates AI
            const lines = code.split('\n');
            const properlyIndented = lines.filter(l => {
                const match = l.match(/^\s*/);
                const indent = match ? match[0].length : 0;
                return indent % 4 === 0 && l.trim().length > 0;
            }).length;
            
            return properlyIndented / lines.length;
        }
        
        function extractTokens(code) {
            // Simple tokenization
            const tokens = code.match(/\b\w+\b|[(){}\[\]<>;:,]/g) || [];
            return tokens.slice(0, 100).join('|');
        }
        
        function generateASTSignature(code) {
            // Simplified AST-like signature
            const keywords = code.match(/\b(if|for|while|do|switch|case|break|continue|return)\b/g) || [];
            const functions = code.match(/\w+\s*\(/g) || [];
            return [keywords.length, functions.length, code.length].join(':');
        }
        
        function calculateAISimilarity(code, analysis) {
            // Multi-method similarity calculation
            let baseScore = analysis.suspiciousCount * 20; // Each marker = 20%
            
            // Check against known AI patterns
            const codeHash = generateHash(code);
            if (SECURITY.codeSubmissionCache.has(codeHash)) {
                baseScore += 25; // Identical code found = +25%
            } else {
                SECURITY.codeSubmissionCache.set(codeHash, {
                    code: code.substring(0, 500),
                    timestamp: Date.now()
                });
            }
            
            // Token similarity
            const tokens = extractTokens(code);
            if (tokens.length > 0) {
                const uniqueTokens = new Set(tokens.split('|')).size;
                const tokenDiversity = uniqueTokens / tokens.split('|').length;
                if (tokenDiversity < 0.3) baseScore += 15; // Low diversity = +15%
            }
            
            return Math.min(100, baseScore + (Math.random() * 10)); // Add small randomness for demo
        }
        
        function simulateCodeExecution(code, problem) {
            // Simulated code execution - in real app, this would be done by a Docker sandbox
            const verdicts = ['Accepted', 'Wrong Answer', 'Time Limit Exceeded', 'Runtime Error', 'Compilation Error'];
            const messages = {
                'Accepted': 'All test cases passed!',
                'Wrong Answer': 'Output does not match expected result on test case 3',
                'Time Limit Exceeded': 'Execution exceeded the time limit of 1000ms',
                'Runtime Error': 'Segmentation fault on test case 2',
                'Compilation Error': 'error: expected \';\' before \'}\' token'
            };
            
            // Simple heuristics for demo
            let verdict = 'Accepted';
            
            if (!code.includes('int main')) {
                verdict = 'Compilation Error';
            } else if (code.includes('while(1)') || code.includes('while(true)')) {
                verdict = 'Time Limit Exceeded';
            } else if (Math.random() < 0.3) {
                verdict = 'Wrong Answer';
            } else if (Math.random() < 0.1) {
                verdict = 'Runtime Error';
            }
            
            return {
                verdict,
                message: messages[verdict],
                executionTime: Math.floor(Math.random() * 500) + 10,
                memoryUsage: Math.floor(Math.random() * 10000) + 1000
            };
        }
        
        function calculateScore(verdict, similarityScore, maxPoints) {
            if (verdict !== 'Accepted') return 0;
            
            let score = maxPoints;
            if (similarityScore >= CONFIG.AI_SIMILARITY_THRESHOLD) {
                score -= CONFIG.AI_PENALTY;
            }
            
            return Math.max(0, score);
        }

        function calculateLeaderboard(contestId = null) {
            const submissions = contestId 
                ? appState.data.submissions.filter(s => s.contestRef === contestId)
                : appState.data.submissions;
            
            const userScores = {};
            
            submissions.forEach(sub => {
                if (!userScores[sub.userRef]) {
                    const user = appState.data.users.find(u => u.userId === sub.userRef);
                    userScores[sub.userRef] = {
                        userId: sub.userRef,
                        username: user?.username || sub.userRef,
                        score: 0,
                        solved: new Set(),
                        submissions: 0
                    };
                }
                
                userScores[sub.userRef].submissions++;
                
                if (sub.verdict === 'Accepted') {
                    userScores[sub.userRef].solved.add(sub.problemRef);
                    // Only count best score per problem
                    const existingScore = userScores[sub.userRef].problemScores?.[sub.problemRef] || 0;
                    if (!userScores[sub.userRef].problemScores) {
                        userScores[sub.userRef].problemScores = {};
                    }
                    userScores[sub.userRef].problemScores[sub.problemRef] = Math.max(existingScore, sub.score || 0);
                }
            });
            
            // Calculate total scores
            Object.values(userScores).forEach(user => {
                user.score = Object.values(user.problemScores || {}).reduce((sum, s) => sum + s, 0);
                user.solved = user.solved.size;
            });
            
            return Object.values(userScores)
                .sort((a, b) => b.score - a.score || a.submissions - b.submissions);
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const registerBtn = document.getElementById('register-btn');
            
            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            // Check if username exists
            if (appState.data.users.some(u => u.username === username)) {
                showToast('Username already taken', 'error');
                return;
            }
            
            // Check limit
            if (appState.data.users.length >= 999) {
                showToast('User limit reached', 'error');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = '⚡ Creating...';
            
            const userId = generateId('user');
            const user = {
                type: 'user',
                userId,
                username,
                password,
                createdAt: new Date().toISOString()
            };
            
            const result = await window.dataSdk.create(user);
            
            if (result.isOk) {
                appState.currentUser = user;
                localStorage.setItem('codeArenaUser', JSON.stringify(user));
                showToast('✅ Account created successfully!', 'success');
                navigateTo('home');
            } else {
                showToast('Failed to create account', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = '⚡ Create Account Instantly';
            }
        }

        function calculateAdminStats() {
            const totalContests = appState.data.contests.length;
            const activeContests = appState.data.contests.filter(c => c.status === 'active').length;
            const totalProblems = appState.data.problems.length;
            const totalUsers = appState.data.users.length;
            const totalSubmissions = appState.data.submissions.length;
            const activeUsers = new Set(appState.data.submissions.map(s => s.userRef)).size;
            
            const acceptedSubmissions = appState.data.submissions.filter(s => s.verdict === 'Accepted').length;
            const acceptedRate = totalSubmissions > 0 ? Math.round((acceptedSubmissions / totalSubmissions) * 100) : 0;
            
            const aiSimilarityCount = appState.data.submissions.filter(s => s.similarityScore >= CONFIG.AI_SIMILARITY_THRESHOLD).length;
            const suspiciousCount = appState.data.submissions.filter(s => s.suspicious === true).length;
            const cleanSubmissions = totalSubmissions - aiSimilarityCount;
            
            const problemsAvg = totalContests > 0 ? Math.round(totalProblems / totalContests) : 0;
            
            return {
                totalContests,
                activeContests,
                totalProblems,
                problemsAvg,
                totalUsers,
                activeUsers,
                totalSubmissions,
                acceptedRate,
                aiSimilarityCount,
                suspiciousCount,
                cleanSubmissions
            };
        }

        async function saveContest(event) {
            event.preventDefault();
            
            const title = document.getElementById('contest-title').value;
            const description = document.getElementById('contest-desc').value;
            const startTime = new Date(document.getElementById('contest-start').value).toISOString();
            const duration = parseInt(document.getElementById('contest-duration').value) * 60000;
            const problemMode = document.getElementById('contest-mode').value;
            const status = document.getElementById('contest-status').value;
            const existingId = document.getElementById('contest-id').value;
            const backendId = document.getElementById('contest-backend-id').value;
            const saveBtn = document.getElementById('save-contest-btn');
            
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';
            
            if (existingId && backendId) {
                // Update existing
                const existingContest = appState.data.contests.find(c => c.__backendId === backendId);
                if (existingContest) {
                    const result = await window.dataSdk.update({
                        ...existingContest,
                        title,
                        description,
                        startTime,
                        duration,
                        problemMode,
                        status
                    });
                    
                    if (result.isOk) {
                        showToast('Contest updated successfully!', 'success');
                    } else {
                        showToast('Failed to update contest', 'error');
                    }
                }
            } else {
                // Create new
                if (appState.data.contests.length >= 999) {
                    showToast('Contest limit reached', 'error');
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Create Contest';
                    return;
                }
                
                const contest = {
                    type: 'contest',
                    contestId: generateId('contest'),
                    title,
                    description,
                    startTime,
                    duration,
                    problemMode,
                    status,
                    createdAt: new Date().toISOString()
                };
                
                const result = await window.dataSdk.create(contest);
                
                if (result.isOk) {
                    showToast('Contest created successfully!', 'success');
                } else {
                    showToast('Failed to create contest', 'error');
                }
            }
            
            saveBtn.disabled = false;
            saveBtn.textContent = existingId ? 'Update Contest' : 'Create Contest';
            appState.currentContest = null;
            navigateTo('admin');
        }

                        contestRef,
                        title,
                        statement,
                        inputFormat,
                        outputFormat,
                        constraints,
                        sampleInput,
                        sampleOutput,
                        points,
                        order,
                        hiddenTests
                    });
                    
                    if (result.isOk) {
                        showToast('Problem updated!', 'success');

                    saveBtn.textContent = 'Save Problem';

                const problem = {

                    problemId: generateId('prob'),
                    contestRef,
                    title,
                    statement,
                    inputFormat,
                    outputFormat,
                    constraints,
                    sampleInput,
                    sampleOutput,
                    points,

                setTimeout(() => { deleteProblemTarget = null; }, 3000);

        async function deleteProblem(backendId) {
            const problem = appState.data.problems.find(p => p.__backendId === backendId);
