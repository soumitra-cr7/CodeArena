<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codelet Contest Platform</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        code, pre {
            font-family: 'JetBrains Mono', monospace;
        }

        .minimal-border {
            border: 1px solid #000000;
        }

        .btn-minimal {
            border: 1px solid #000000;
            padding: 4px 12px;
            background: #ffffff;
            transition: background 0.1s;
        }

        .btn-minimal:hover {
            background: #f0f0f0;
        }

        .btn-minimal:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-link {
            text-decoration: none;
            color: #000000;
            font-weight: 500;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        /* Table styling to match Codeforces */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 8px;
            border: 1px solid #e5e5e5;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        .verdict-accepted { color: #00a000; font-weight: bold; }
        .verdict-wrong { color: #ff0000; }
        .verdict-ce { color: #ff8800; font-weight: bold; }
        .verdict-pending { color: #888888; }
        
        .rank-badge {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid #000;
            font-size: 11px;
            font-weight: bold;
        }
        
        .rank-beginner { background: #e0e0e0; }
        .rank-bronze { background: #cd7f32; color: white; }
        .rank-silver { background: #c0c0c0; }
        .rank-gold { background: #ffd700; }
        .rank-diamond { background: #b9f2ff; }
        .rank-heroic { background: #ff69b4; color: white; }
        .rank-master { background: #4169e1; color: white; }
        .rank-grandmaster { background: #ff0000; color: white; }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app-wrapper" class="w-full h-full flex flex-col max-w-5xl mx-auto px-4 py-6"><!-- Header -->
   <header class="bg-white rounded-12 px-6 py-4 mb-8 shadow-sm">
    <div class="flex justify-between items-center">
     <h1 id="site-logo" class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-blue-500 bg-clip-text text-transparent">CODELET</h1>
     <div id="auth-nav" class="flex gap-3 items-center"><!-- Auth links injected here -->
     </div>
    </div>
    <nav class="flex gap-8 mt-6 text-sm"><a href="#" onclick="navigate('home')" class="nav-link">Home</a> <a href="#" onclick="navigate('contests')" class="nav-link">Contests</a> <a href="#" onclick="navigate('leaderboard')" class="nav-link">Leaderboard</a> <a href="#" onclick="navigate('submissions')" class="nav-link">Submissions</a> <a href="#" onclick="navigate('profile')" class="nav-link" id="nav-profile" style="display:none">Profile</a> <a href="#" onclick="navigate('admin')" class="nav-link" id="nav-admin" style="display:none">Admin</a>
    </nav>
    <div id="announcement-bar" class="mt-4 px-4 py-3 bg-blue-50 text-blue-900 text-sm border border-blue-200 rounded-8 hidden" style="border-radius: 8px;"><!-- Announcement text -->
    </div>
   </header><!-- Main Content Area -->
   <main id="main-content" class="flex-grow"><!-- Content dynamically injected here -->
    <div id="loading" class="text-center py-20">
     Loading platform...
    </div>
   </main><!-- Footer -->
   <footer class="mt-12 pt-6 border-t border-gray-200 text-xs text-gray-500 text-center">
    © 2024 Codelet Programming Platform. All data stored in Canva Sheets.
   </footer>
  </div><!-- Modals / Overlays -->
  <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
   <div class="bg-white p-6 minimal-border max-w-md w-full">
    <h3 id="overlay-title" class="text-lg font-bold mb-4"></h3>
    <div id="overlay-content"></div>
    <div class="flex justify-end mt-6 gap-2"><button onclick="closeOverlay()" class="btn-minimal">Close</button>
    </div>
   </div>
  </div>
  <script>
        // --- State Management ---
        let config = {
            site_title: "CODELET",
            announcement: "",
            background_color: "#ffffff",
            text_color: "#000000"
        };

        let currentUser = JSON.parse(localStorage.getItem('cl_user')) || null;
        let currentView = 'home';
        let allData = [];
        let isProcessing = false;
        
        // Admin credentials
        const ADMIN_CREDENTIALS = {
            username: 'soumitra',
            password: 'admin115252'
        };

        // --- Data Handling ---
        const dataHandler = {
            onDataChanged(data) {
                allData = data;
                render();
            }
        };

        async function initApp() {
            // Initialize Elements SDK
            if (window.elementSdk) {
                await window.elementSdk.init({
                    defaultConfig: config,
                    onConfigChange: async (newConfig) => {
                        config = { ...config, ...newConfig };
                        updateGlobalStyles();
                    },
                    mapToCapabilities: (cfg) => ({
                        recolorables: [
                            { get: () => cfg.background_color, set: (v) => window.elementSdk.setConfig({ background_color: v }) },
                            { get: () => cfg.text_color, set: (v) => window.elementSdk.setConfig({ text_color: v }) }
                        ],
                        fontEditable: { get: () => "Inter", set: () => {} },
                        fontSizeable: { get: () => 16, set: () => {} }
                    }),
                    mapToEditPanelValues: (cfg) => new Map([
                        ["site_title", cfg.site_title],
                        ["announcement", cfg.announcement]
                    ])
                });
            }

            // Initialize Data SDK
            if (window.dataSdk) {
                const initResult = await window.dataSdk.init(dataHandler);
                if (!initResult.isOk) console.error("Data SDK failed");
            }

            updateGlobalStyles();
            render();
        }

        function updateGlobalStyles() {
            const logo = document.getElementById('site-logo');
            if (logo) logo.textContent = config.site_title.toUpperCase();
            
            const annBar = document.getElementById('announcement-bar');
            if (config.announcement) {
                annBar.textContent = config.announcement;
                annBar.classList.remove('hidden');
            } else {
                annBar.classList.add('hidden');
            }

            document.body.style.backgroundColor = config.background_color;
            document.body.style.color = config.text_color;
        }

        // --- Navigation ---
        function navigate(view, params = null) {
            currentView = view;
            window.currentParams = params;
            render();
        }

        // --- UI Rendering ---
        function render() {
            renderAuthNav();
            const main = document.getElementById('main-content');
            
            // Handle views
            switch (currentView) {
                case 'home': renderHome(main); break;
                case 'contests': renderContests(main); break;
                case 'leaderboard': renderLeaderboard(main); break;
                case 'submissions': renderSubmissions(main); break;
                case 'profile': renderProfile(main); break;
                case 'user_profile': renderUserProfile(main, window.currentParams); break;
                case 'admin': renderAdmin(main); break;
                case 'contest_view': renderContestDetail(main, window.currentParams); break;
                case 'problem_view': renderProblemDetail(main, window.currentParams); break;
                case 'submission_detail': renderSubmissionDetail(main, window.currentParams); break;
                case 'login': renderLogin(main); break;
                case 'register': renderRegister(main); break;
                default: renderHome(main);
            }

            // Special menu visibility
            document.getElementById('nav-profile').style.display = currentUser ? 'block' : 'none';
            document.getElementById('nav-admin').style.display = (currentUser && currentUser.role === 'admin') ? 'block' : 'none';
        }

        function renderAuthNav() {
            const nav = document.getElementById('auth-nav');
            if (currentUser) {
                nav.innerHTML = `
                    <span class="text-sm font-bold">${currentUser.username}</span>
                    <button onclick="logout()" class="text-xs underline">Logout</button>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="navigate('login')" class="nav-link text-sm">Login</button>
                    <button onclick="navigate('register')" class="nav-link text-sm">Register</button>
                `;
            }
        }

        function renderHome(container) {
            container.innerHTML = `
                <div class="space-y-10">
                    <!-- Hero Section -->
                    <div class="bg-gradient-to-r from-blue-600 via-blue-500 to-blue-400 rounded-20 p-12 text-white relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-40 h-40 bg-white opacity-5 rounded-full transform translate-x-20 -translate-y-20"></div>
                        <div class="absolute bottom-0 left-0 w-32 h-32 bg-white opacity-5 rounded-full transform -translate-x-16 translate-y-16"></div>
                        <div class="relative z-10">
                            <h1 class="text-5xl font-bold mb-4">Welcome to ${config.site_title}</h1>
                            <p class="text-lg text-blue-100 mb-2">Master competitive programming through challenging contests</p>
                            <p class="text-sm text-blue-100 mb-8">Test your skills, compete globally, and climb the leaderboard</p>
                            <div class="flex gap-4">
                                <button onclick="navigate('contests')" class="bg-white text-blue-600 font-bold px-6 py-3 rounded-10 hover:shadow-lg transition-all duration-200">
                                    🏆 Browse Contests
                                </button>
                                <button onclick="navigate('leaderboard')" class="bg-blue-500 border-2 border-white text-white font-bold px-6 py-3 rounded-10 hover:shadow-lg transition-all duration-200">
                                    🌟 View Rankings
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Stats Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="card p-6 bg-gradient-to-br from-purple-50 to-transparent border-l-4 border-purple-500">
                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="text-3xl font-bold text-purple-600 mb-1" id="total-contests">0</div>
                                    <div class="text-sm text-gray-600 font-semibold">Active Contests</div>
                                </div>
                                <div class="text-4xl">🏆</div>
                            </div>
                        </div>
                        <div class="card p-6 bg-gradient-to-br from-green-50 to-transparent border-l-4 border-green-500">
                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="text-3xl font-bold text-green-600 mb-1" id="total-users">0</div>
                                    <div class="text-sm text-gray-600 font-semibold">Programmers</div>
                                </div>
                                <div class="text-4xl">👥</div>
                            </div>
                        </div>
                        <div class="card p-6 bg-gradient-to-br from-amber-50 to-transparent border-l-4 border-amber-500">
                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="text-3xl font-bold text-amber-600 mb-1" id="total-problems">0</div>
                                    <div class="text-sm text-gray-600 font-semibold">Problems</div>
                                </div>
                                <div class="text-4xl">💻</div>
                            </div>
                        </div>
                    </div>

                    <!-- Upcoming Contests -->
                    <div class="card p-8 shadow-md hover:shadow-lg transition-shadow duration-200">
                        <h3 class="font-bold text-xl mb-6 flex items-center gap-3 text-gray-900 pb-4 border-b-2 border-blue-100">
                            <span class="text-2xl">🚀</span> Upcoming Contests
                        </h3>
                        <div id="upcoming-list" class="space-y-3">
                            <div class="text-center py-12 text-gray-400">
                                <div class="text-4xl mb-3">📭</div>
                                <p class="text-sm italic">No contests scheduled yet</p>
                            </div>
                        </div>
                    </div>

                    <!-- Features Section -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="card p-6 text-center hover:shadow-md transition-all duration-200">
                            <div class="text-4xl mb-3">⚡</div>
                            <h4 class="font-bold text-gray-900 mb-2">Fast Judging</h4>
                            <p class="text-xs text-gray-600">Real-time verdict feedback</p>
                        </div>
                        <div class="card p-6 text-center hover:shadow-md transition-all duration-200">
                            <div class="text-4xl mb-3">🌍</div>
                            <h4 class="font-bold text-gray-900 mb-2">Global Leaderboard</h4>
                            <p class="text-xs text-gray-600">Compete worldwide rankings</p>
                        </div>
                        <div class="card p-6 text-center hover:shadow-md transition-all duration-200">
                            <div class="text-4xl mb-3">🔬</div>
                            <h4 class="font-bold text-gray-900 mb-2">AI Detection</h4>
                            <p class="text-xs text-gray-600">Plagiarism checking system</p>
                        </div>
                        <div class="card p-6 text-center hover:shadow-md transition-all duration-200">
                            <div class="text-4xl mb-3">🎯</div>
                            <h4 class="font-bold text-gray-900 mb-2">Ranked Tiers</h4>
                            <p class="text-xs text-gray-600">From Beginner to Grandmaster</p>
                        </div>
                    </div>

                    <!-- CTA Section -->
                    <div class="card bg-gradient-to-r from-blue-50 to-indigo-50 p-10 text-center border-2 border-blue-200 rounded-16">
                        <h3 class="text-2xl font-bold text-gray-900 mb-3">Ready to Compete?</h3>
                        <p class="text-gray-600 mb-6 text-sm">Join thousands of programmers solving challenging problems</p>
                        ${currentUser ? `
                            <button onclick="navigate('contests')" class="bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold px-8 py-3 rounded-10 hover:shadow-lg transition-all duration-200 inline-block">
                                Start Competing Now →
                            </button>
                        ` : `
                            <div class="flex gap-4 justify-center">
                                <button onclick="navigate('register')" class="bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold px-6 py-3 rounded-10 hover:shadow-lg transition-all duration-200">
                                    Sign Up Now
                                </button>
                                <button onclick="navigate('login')" class="border-2 border-blue-600 text-blue-600 font-bold px-6 py-3 rounded-10 hover:bg-blue-50 transition-all duration-200">
                                    Sign In
                                </button>
                            </div>
                        `}
                    </div>
                </div>
            `;
            
            const contests = allData.filter(d => d.type === 'contest' && d.published).sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
            const list = document.getElementById('upcoming-list');
            document.getElementById('total-contests').textContent = contests.length;
            
            if (contests.length > 0) {
                list.innerHTML = contests.map(c => `
                    <div class="flex justify-between items-center p-4 bg-gradient-to-r from-blue-50 to-transparent rounded-lg border border-blue-200 hover:shadow-md transition-all duration-200">
                        <div class="flex-1">
                            <div class="font-semibold text-gray-900">${c.title}</div>
                            <div class="text-xs text-gray-500 mt-1">📅 ${new Date(c.start_time).toLocaleDateString()}</div>
                        </div>
                        <button onclick="navigate('contest_view', '${c.__backendId}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors">View</button>
                    </div>
                `).join('');
            }

            const users = allData.filter(d => d.type === 'user');
            const problems = allData.filter(d => d.type === 'problem');
            document.getElementById('total-users').textContent = users.length;
            document.getElementById('total-problems').textContent = problems.length;
            
            const topUsers = users.map(u => {
                const subs = allData.filter(d => d.type === 'submission' && d.user_id === u.username);
                const accepted = subs.filter(s => s.verdict === 'Accepted').length;
                return { username: u.username, points: accepted * 5 };
            }).sort((a, b) => b.points - a.points).slice(0, 5);

            const userList = document.getElementById('top-users');
            if (topUsers.length > 0) {
                userList.innerHTML = topUsers.map((u, i) => `
                    <div class="flex justify-between items-center p-4 bg-gradient-to-r from-amber-50 to-transparent rounded-lg border border-amber-200 hover:shadow-md transition-all duration-200">
                        <div class="flex items-center gap-3">
                            <span class="text-xl font-bold text-amber-600">${['🥇', '🥈', '🥉', '4️⃣', '5️⃣'][i]}</span>
                            <div>
                                <div class="font-semibold text-gray-900">${u.username}</div>
                                <div class="text-xs text-gray-500">${u.points} points</div>
                            </div>
                        </div>
                        <button onclick="navigate('user_profile', '${u.username}')" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-amber-700 transition-colors">Profile</button>
                    </div>
                `).join('');
            }
        }

        function renderContests(container) {
            const contests = allData.filter(d => d.type === 'contest' && d.published);
            container.innerHTML = `
                <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">🏆 Contests</h2>
                <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>Contest Name</th>
                            <th>Start Time</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${contests.length === 0 ? '<tr><td colspan="5" class="text-center py-8 text-gray-500">No contests available yet.</td></tr>' : contests.map(c => {
                            const now = new Date();
                            const start = new Date(c.start_time);
                            const end = new Date(c.end_time);
                            let statusText = "Upcoming";
                            let statusBg = "bg-blue-100 text-blue-700";
                            if (now > start && now < end) {
                                statusText = "Active";
                                statusBg = "bg-green-100 text-green-700";
                            }
                            if (now > end) {
                                statusText = "Finished";
                                statusBg = "bg-gray-100 text-gray-700";
                            }
                            return `
                            <tr>
                                <td class="font-semibold">${c.title}</td>
                                <td class="text-sm">${start.toLocaleString()}</td>
                                <td class="text-sm">${calculateDuration(c.start_time, c.end_time)}</td>
                                <td><span class="px-3 py-1 rounded-full text-xs font-bold ${statusBg}">${statusText}</span></td>
                                <td><button onclick="navigate('contest_view', '${c.__backendId}')" class="underline">Enter</button></td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
                </div>
            `;
        }

        function renderContestDetail(container, id) {
            const contest = allData.find(d => d.__backendId === id);
            if (!contest) return container.innerHTML = "Contest not found.";

            const problems = allData.filter(d => d.type === 'problem' && d.contest_id === id);
            const now = new Date();
            const start = new Date(contest.start_time);
            const end = new Date(contest.end_time);
            
            let statusText = "Upcoming";
            let countdownText = "";
            let isActive = false;
            
            if (now > start && now < end) {
                statusText = "Active";
                isActive = true;
                const diff = end - now;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                countdownText = `⏱️ Ends in: ${hours}h ${mins}m ${secs}s`;
            }
            if (now > end) statusText = "Finished";
            if (now < start) {
                const diff = start - now;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                countdownText = `🚀 Starts in: ${hours}h ${mins}m ${secs}s`;
            }

            container.innerHTML = `
                <div class="mb-8">
                    <button onclick="navigate('contests')" class="text-sm underline mb-6 text-gray-600">← Back to Contests</button>
                    <h2 class="text-3xl font-bold mb-4">${contest.title}</h2>
                    <div class="flex flex-wrap gap-4 items-center mb-6">
                        <span class="px-4 py-2 rounded-lg ${statusText === 'Active' ? 'bg-green-100 text-green-700' : statusText === 'Finished' ? 'bg-gray-100 text-gray-700' : 'bg-blue-100 text-blue-700'} text-sm font-bold">
                            ${statusText}
                        </span>
                        ${countdownText ? `<span id="countdown" class="font-mono text-sm font-bold text-blue-600">${countdownText}</span>` : ''}
                    </div>
                    <div class="grid grid-cols-3 gap-4 text-sm text-gray-600">
                        <div>📅 Starts: ${start.toLocaleString()}</div>
                        <div>⏰ Ends: ${end.toLocaleString()}</div>
                        <div>📊 Problems: ${problems.length}</div>
                    </div>
                </div>

                <div class="card p-8">
                    <h3 class="font-bold text-lg mb-6">📝 Problems</h3>
                    ${problems.length === 0 ? '<p class="text-sm text-gray-500 italic">No problems added yet.</p>' : `
                        <div class="overflow-x-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Problem Name</th>
                                    <th>Time Limit</th>
                                    <th>Points</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${problems.map((p, idx) => `
                                    <tr>
                                        <td class="font-bold text-lg w-10">${String.fromCharCode(65 + idx)}</td>
                                        <td class="font-semibold">${p.title}</td>
                                        <td class="text-sm">${p.time_limit || 2.0}s</td>
                                        <td class="font-bold">5</td>
                                        <td>
                                            ${statusText === 'Upcoming' ? '<span class="text-gray-400 text-xs font-bold">🔒 Locked</span>' : `<button onclick="navigate('problem_view', {cid: '${id}', pid: '${p.__backendId}'})" class="underline">View</button>`}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        </div>
                    `}
                </div>
            `;
            
            // Update countdown every second
            if (countdownText) {
                const interval = setInterval(() => {
                    const countdown = document.getElementById('countdown');
                    if (!countdown) {
                        clearInterval(interval);
                        return;
                    }
                    const nowCheck = new Date();
                    if (nowCheck > start && nowCheck < end) {
                        const diff = end - nowCheck;
                        const hours = Math.floor(diff / (1000 * 60 * 60));
                        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const secs = Math.floor((diff % (1000 * 60)) / 1000);
                        countdown.textContent = `⏱️ Ends in: ${hours}h ${mins}m ${secs}s`;
                    } else if (nowCheck < start) {
                        const diff = start - nowCheck;
                        const hours = Math.floor(diff / (1000 * 60 * 60));
                        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const secs = Math.floor((diff % (1000 * 60)) / 1000);
                        countdown.textContent = `🚀 Starts in: ${hours}h ${mins}m ${secs}s`;
                    } else {
                        countdown.textContent = "✅ Contest finished";
                        clearInterval(interval);
                    }
                }, 1000);
            }
        }

        async function submitCode(cid, pid) {
            if (!currentUser) return showToast("Please login to submit", "error");
            
            const code = document.getElementById('sub-code').value;
            const lang = document.getElementById('sub-lang').value;
            if (!code.trim()) return showToast("Code cannot be empty", "error");

            isProcessing = true;
            document.getElementById('btn-submit').disabled = true;
            showToast("Compiling and validating...", "info");
            
            // Simulate code analysis
            await new Promise(r => setTimeout(r, 1000));
            
            // Smart C++ validation - check for common syntax issues
            let hasWrongAnswer = false;
            const issues = [];
            
            // Check for missing includes
            const hasVector = code.includes('#include <vector>') || code.includes('#include<vector>');
            const hasAlgorithm = code.includes('#include <algorithm>') || code.includes('#include<algorithm>');
            const hasMap = code.includes('#include <map>') || code.includes('#include<map>');
            
            // Check for common mistakes
            if (code.includes('vectorr') || code.includes('vctor')) issues.push("Invalid vector declaration");
            if (code.includes('cout >>') && !code.includes('cin >>')) issues.push("Wrong input/output operator");
            if (code.includes('sort(') && !hasAlgorithm) issues.push("sort() requires <algorithm> header");
            if (code.includes('vector<') && !hasVector) issues.push("<vector> header not included");
            if (code.includes('map<') && !hasMap) issues.push("<map> header not included");
            if (code.includes('int main()') && !code.includes('return 0')) issues.push("Missing return statement");
            if (code.includes('for(') && code.match(/for\([^;]*;[^;]*;[^)]*\)/g)?.some(f => !f.includes('++') && !f.includes('--'))) issues.push("Invalid loop increment");
            
            // If there are issues, mark as Wrong Answer
            if (issues.length > 0) {
                hasWrongAnswer = true;
            }
            
            // Simulate compilation error detection (15% chance if no syntax issues)
            if (!hasWrongAnswer && Math.random() < 0.15) {
                const ceErrors = [
                    "error: 'vector' was not declared in this scope",
                    "error: expected ';' before 'return'",
                    "error: no matching function for call to 'sort'",
                    "error: undefined reference to 'main'",
                    "error: 'cout' was not declared in this scope"
                ];
                const ceError = ceErrors[Math.floor(Math.random() * ceErrors.length)];
                
                const result = await window.dataSdk.create({
                    type: 'submission',
                    user_id: currentUser.username,
                    contest_id: cid,
                    problem_id: pid,
                    code: code,
                    language: lang,
                    verdict: 'Compilation Error',
                    compilation_error: ceError,
                    similarity: 0,
                    timestamp: new Date().toISOString()
                });

                isProcessing = false;
                document.getElementById('btn-submit').disabled = false;
                if (result.isOk) {
                    showToast("Compilation Error", "error");
                    navigate('submissions');
                }
                return;
            }
            
            await new Promise(r => setTimeout(r, 1500));
            
            // Determine verdict
            let verdict = "Accepted";
            if (hasWrongAnswer) {
                verdict = "Wrong Answer";
            } else {
                // Random verdict (70% acceptance if valid syntax)
                const verdicts = ["Accepted", "Wrong Answer", "Accepted", "Accepted", "Wrong Answer"];
                verdict = verdicts[Math.floor(Math.random() * verdicts.length)];
            }
            
            const similarity = Math.floor(Math.random() * 100);

            const result = await window.dataSdk.create({
                type: 'submission',
                user_id: currentUser.username,
                contest_id: cid,
                problem_id: pid,
                code: code,
                language: lang,
                verdict: verdict,
                similarity: similarity,
                timestamp: new Date().toISOString(),
                ai_checked: false
            });

            isProcessing = false;
            document.getElementById('btn-submit').disabled = false;
            if (result.isOk) {
                showToast(`Submission: ${verdict}${hasWrongAnswer ? ' - Syntax/Logic issues detected' : ''}`, verdict === 'Accepted' ? 'success' : 'error');
                navigate('submissions');
            } else {
                showToast("Failed to save submission", "error");
                render();
            }
        }

            if (result.isOk) {
                showToast(updated.published ? "Contest published!" : "Contest unpublished!");

        async function runAICheck(cid) {
            const subs = allData.filter(d => d.type === 'submission' && d.contest_id === cid && !d.ai_checked);
            
            if (subs.length === 0) {
                showToast("All submissions already checked!", "info");
                return;
            }
            
            showToast(`Running AI check on ${subs.length} submissions...`, "info");
            
            for (const sub of subs) {
                const similarity = Math.floor(Math.random() * 100);
                const updated = { ...sub, ai_checked: true, similarity };
                await window.dataSdk.update(updated);
            }
            
            showToast("AI check completed!");
        }

        async function saveProblem(cid) {
            const title = document.getElementById('p-title').value;
            const statement = document.getElementById('p-statement').value;
            const input = document.getElementById('p-input').value;
            const output = document.getElementById('p-output').value;
            const sampleIn = document.getElementById('p-sample-in').value;
            const sampleOut = document.getElementById('p-sample-out').value;
            const note = document.getElementById('p-note').value;
            const timeLimit = parseFloat(document.getElementById('p-time').value);
            const memLimit = parseInt(document.getElementById('p-memory').value);

            if (!title || !statement || !input || !output) {
                showToast("Please fill in all required fields", "error");
                return;
            }

            const result = await window.dataSdk.create({
                type: 'problem',
                contest_id: cid,
                title,
                problem_statement: statement,
                input_format: input,
                output_format: output,
                sample_input: sampleIn,
                sample_output: sampleOut,
                note: note,
                time_limit: timeLimit,
                memory_limit: memLimit
            });

            if (result.isOk) {
                closeOverlay();
                showToast("Problem added successfully!");
            } else {
                showToast("Failed to add problem", "error");
            }
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            if (!user || !pass) return showToast("Please enter credentials", "error");
            
            // Check admin credentials
            if (user === ADMIN_CREDENTIALS.username && pass === ADMIN_CREDENTIALS.password) {
                currentUser = {
                    username: user,
                    role: 'admin'
                };
                localStorage.setItem('cl_user', JSON.stringify(currentUser));
                navigate('admin');
                showToast(`Welcome, Admin ${user}!`);
                return;
            }
            
            // Regular user login (any username/password)
            currentUser = {
                username: user,
                role: 'user'
            };
            localStorage.setItem('cl_user', JSON.stringify(currentUser));
            navigate('home');
            showToast(`Welcome back, ${user}!`);
        }

        function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            
            if (!user || !email || !pass) return showToast("Please fill all fields", "error");
            
            // Create user record
            window.dataSdk.create({
                type: 'user',
                username: user,
                email: email,
                password: pass,
                role: 'user',
                points: 0,
                penalties: 0
            }).then(result => {
                if (result.isOk) {
                    currentUser = {
                        username: user,

                    };

            });

        function calculateDuration(start, end) {
            const diff = new Date(end) - new Date(start);
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            return `${hours}h ${mins}m`;
        }

        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white text-sm z-[100] transform transition-all duration-300 font-medium ${bgColor}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function deleteItem(id) {
            const item = allData.find(d => d.__backendId === id);

        async function requestLeaderboardAccess() {
            if (!currentUser) return;

            showToast("Sending request to admins...", "info");

            const result = await window.dataSdk.create({
                type: 'leaderboard_request',
                user_id: currentUser.username,
                leaderboard_approved: false,
                timestamp: new Date().toISOString()
            });

            if (result.isOk) {
                showToast("✅ Request sent! Admins will review shortly.", "success");
                render();
            } else {
                showToast("Failed to send request", "error");
            }
        }

        async function approveLeaderboardRequest(requestId) {
            const request = allData.find(d => d.__backendId === requestId);
            if (!request) return;

            const updated = { ...request, leaderboard_approved: true };
            const result = await window.dataSdk.update(updated);

            if (result.isOk) {
                showToast(`✅ Access granted to ${request.user_id}!`);
            } else {
                showToast("Failed to approve request", "error");
            }
        }
